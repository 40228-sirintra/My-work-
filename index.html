<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salacca Sumalee - หวานหวาน ฟรุ๊ตตี้ Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff6600;
            --secondary: #d35400;
            --success: #27ae60;
            --bg: #fff5e6;
        }

        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; }

        body {
            background: linear-gradient(135deg, #fff5e6 0%, #ffcc80 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* การ์ดหลัก */
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(211, 84, 0, 0.2);
            width: 100%;
            max-width: 500px;
            text-align: center;
            border: 2px solid white;
        }

        .icon-header { font-size: 70px; margin-bottom: 10px; display: block; }

        h1 { color: var(--secondary); font-weight: 800; margin: 0; font-size: 2rem; }
        .sub-title { color: #666; margin-bottom: 30px; font-weight: 300; }

        /* ส่วนกรอกข้อมูล */
        .input-section {
            background: #fff;
            padding: 25px;
            border-radius: 25px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        label { display: block; margin-bottom: 10px; font-weight: 600; color: #444; }
        
        input[type="date"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 15px;
            font-size: 18px;
            outline: none;
            transition: 0.3s;
            text-align: center;
        }

        input[type="date"]:focus { border-color: var(--primary); }

        .btn-calc {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 20px;
            border-radius: 20px;
            font-size: 20px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(230, 126, 34, 0.3);
            transition: 0.3s;
        }

        .btn-calc:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(230, 126, 34, 0.4); }

        /* ส่วนผลลัพธ์ */
        #result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 20px;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        /* ป๊อปอัปเพลงสละเต้น */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(15px);
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 450px;
            padding: 40px;
            border-radius: 40px;
            text-align: center;
            position: relative;
            border: 5px solid var(--primary);
            animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .salacca-dance {
            font-size: 100px;
            display: inline-block;
            animation: dance 0.6s infinite alternate cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        @keyframes dance {
            from { transform: rotate(-15deg) translateY(0); }
            to { transform: rotate(15deg) translateY(-30px); }
        }

        .lyrics-card {
            background: #fff5e6;
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
            border-left: 8px solid var(--primary);
            text-align: left;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .highlight-text { color: var(--secondary); font-weight: bold; }

        .btn-close {
            background: var(--success);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes bounceIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <span class="icon-header">🌴</span>
        <h1>สละสุมาลี ฮับ</h1>
        <p class="sub-title">ระบบแจ้งเตือนความหวาน ฟรุ๊ตตี้</p>

        <div class="input-section">
            <label>เลือกวันที่ผสมเกสรล่าสุด</label>
            <input type="date" id="pollinateDate">
        </div>

        <button class="btn-calc" onclick="calculateHarvest()">เริ่มการคำนวณ!</button>

        <div id="result">
            <h3 id="dateShow" style="color:var(--secondary); margin-bottom:5px;"></h3>
            <div id="dayLeft" style="font-size: 24px; font-weight: 800;"></div>
        </div>
    </div>

    <div id="harvestModal" class="modal">
        <div class="modal-content">
            <div class="salacca-dance">😋</div>
            <h2 style="color:var(--primary); margin:10px 0;">หวานหวาน ฟรุ๊ตตี้!</h2>
            
            <div class="lyrics-card">
                <p class="highlight-text">เห้วันนี้ถึงเวลาเก็บสละหว๊านหวานแล้วน๊ะจ๊ะคนดี<br>
                เอาไปกินไปจำหน่ายขายดิบขายดี</p>
                <p>สละเราออกผลแล้ว รีบมาเก็บเกี่ยวกัน<br>
                อย่าปล่อยให้เลยวัน พรุ่งนี้อาจไม่ทัน...</p>
            </div>

            <button class="btn-close" onclick="closeAll()">รับทราบความหวาน (ปิดเพลง)</button>
        </div>
    </div>

    <audio id="salaccaSong" src="salacca-song.mp3" loop></audio>

    <script>
        function calculateHarvest() {
            const dateVal = document.getElementById('pollinateDate').value;
            if (!dateVal) {
                alert("กรุณาเลือกวันที่ก่อนจ้า!");
                return;
            }

            const startDate = new Date(dateVal);
            const harvestDate = new Date(startDate);
            // รอบเก็บเกี่ยวสละสุมาลี 210 วัน
            harvestDate.setDate(startDate.getDate() + 210);

            const today = new Date();
            today.setHours(0,0,0,0);

            const diffTime = harvestDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            const resultDiv = document.getElementById('result');
            const dateShow = document.getElementById('dateShow');
            const dayLeft = document.getElementById('dayLeft');

            resultDiv.style.display = 'block';
            dateShow.innerText = "วันเก็บเกี่ยว: " + harvestDate.toLocaleDateString('th-TH', { dateStyle: 'long' });

            if (diffDays <= 0) {
                dayLeft.innerText = "หวานฉ่ำพร้อมเก็บแล้ว!";
                dayLeft.style.color = "var(--primary)";
                showPopup();
            } else {
                dayLeft.innerText = "อีก " + diffDays + " วันจะได้เจอกัน";
                dayLeft.style.color = "var(--success)";
            }
        }

        function showPopup() {
            document.getElementById('harvestModal').style.display = 'flex';
            const audio = document.getElementById('salaccaSong');
            audio.play().catch(e => {
                console.log("เพลงจะเล่นหลังจากมีการกดปุ่มในหน้าเว็บ");
            });
        }

        function closeAll() {
            document.getElementById('harvestModal').style.display = 'none';
            const audio = document.getElementById('salaccaSong');
            audio.pause();
            audio.currentTime = 0;
        }
    </script>
</body>
</html>
