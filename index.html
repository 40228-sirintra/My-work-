<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salacca Harvest Smart Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* (ใส่ CSS สไตล์เดิมไว้ตรงนี้นะครับ เพื่อความไม่ยาวเกินไปผมขอละไว้) */
        body { font-family: 'Prompt', sans-serif; background: #222; color: white; text-align: center; padding-top: 50px; }
        .btn { padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 10px; }
        .btn-test { background: #e74c3c; color: white; border: none; }
        .btn-calc { background: #FF5E00; color: white; border: none; }
    </style>
</head>
<body>

    <div style="background: #333; padding: 30px; border-radius: 20px; display: inline-block;">
        <div style="font-size: 50px;">🌴</div>
        <h1>SMART SALACCA</h1>
        
        <input type="date" id="inputDate" style="padding: 10px; margin: 10px 0;"><br>

        <button class="btn btn-calc" onclick="checkHarvest()">คำนวณเลย!</button>
        
        <button class="btn btn-test" onclick="testSound()">🎵 ทดสอบเสียงเพลง</button>

        <div id="daysLeft" style="font-size: 24px; margin-top: 20px; color: #FF9900;"></div>
    </div>

    <audio id="bgMusic" src="song.mp3" preload="auto" loop></audio>

    <script>
        // ฟังก์ชันใหม่: เอาไว้กดเทสต์ว่าเพลงดังไหม
        function testSound() {
            const audio = document.getElementById('bgMusic');
            audio.play().catch(function(error) {
                alert("❌ หาไฟล์เพลงไม่เจอ หรือเบราว์เซอร์บล็อกครับ! \nเช็กว่าเอาไฟล์เพลงมาวางที่เดียวกับโค้ดหรือยัง?");
            });
        }

        function checkHarvest() {
            const dateVal = document.getElementById('inputDate').value;
            if (!dateVal) return alert("เลือกวันที่ก่อนครับ!");

            const startDate = new Date(dateVal);
            const harvestDate = new Date(startDate);
            harvestDate.setDate(startDate.getDate() + 90); // 90 วัน (3 เดือน)

            const today = new Date();
            today.setHours(0,0,0,0);
            const diffDays = Math.ceil((harvestDate - today) / (1000 * 60 * 60 * 24));

            if (diffDays <= 0) {
                document.getElementById('daysLeft').innerText = "ถึงเวลาเก็บเกี่ยวแล้วจ้า! 😋";
                // สั่งเล่นเพลงทันทีที่คำนวณเสร็จ
                document.getElementById('bgMusic').play();
            } else {
                document.getElementById('daysLeft').innerText = "เหลืออีก " + diffDays + " วัน";
                document.getElementById('bgMusic').pause(); // ปิดเพลงถ้ายังไม่ถึงเวลา
            }
        }
    </script>
</body>
</html>
