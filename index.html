<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salacca Harvest Tracker 🌴</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d35400; /* สีสละ */
            --secondary: #27ae60; /* สีใบไม้ */
            --bg: #fff5e6;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        h1 { color: var(--primary); margin-bottom: 5px; }
        p { color: #666; font-size: 0.9rem; }

        .input-group {
            margin: 20px 0;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); }

        button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.3s;
        }

        button:hover { background: #e67e22; transform: translateY(-2px); }

        #resultArea {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px dashed #eee;
        }

        /* Popup สวยๆ */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .harvest-icon { font-size: 80px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <span style="font-size: 50px;">🌴</span>
        <h1>สละสุมาลี ฮับ</h1>
        <p>บันทึกวันผสมเกสร เพื่อคำนวณวันเก็บเกี่ยว</p>

        <div class="input-group">
            <label>เลือกวันที่เริ่มผสมเกสร:</label>
            <input type="date" id="pollinateDate">
        </div>

        <button onclick="calculateHarvest()">บันทึกและคำนวณ</button>

        <div id="resultArea" style="display: none;">
            <h3 id="dateText" style="color: var(--secondary);"></h3>
            <div id="countdownText" style="font-size: 24px; font-weight: bold; color: var(--primary);"></div>
        </div>
    </div>

    <div id="alertModal" class="modal">
        <div class="modal-content">
            <div class="harvest-icon">😋</div>
            <h2 style="color: var(--primary);">ถึงเวลาเก็บเกี่ยวแล้ว!</h2>
            <p>สละสุมาลีของคุณหวานฉ่ำพร้อมส่งออกแล้วครับ</p>
            <button onclick="closeModal()" style="background: var(--secondary);">รับทราบ!</button>
        </div>
    </div>

    <audio id="alertSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        function calculateHarvest() {
            const inputDate = document.getElementById('pollinateDate').value;
            if (!inputDate) return alert("กรุณาเลือกวันที่ก่อนครับ!");

            const startDate = new Date(inputDate);
            // สละสุมาลีใช้เวลาประมาณ 210 วัน
            const harvestDate = new Date(startDate);
            harvestDate.setDate(startDate.getDate() + 210);

            const today = new Date();
            const timeDiff = harvestDate - today;
            const daysLeft = Math.ceil(timeDiff / (1000 * 60 * 60 * 24));

            // แสดงส่วนผลลัพธ์
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('dateText').innerText = "วันเก็บเกี่ยวของคุณคือ: " + harvestDate.toLocaleDateString('th-TH', { dateStyle: 'long' });

            if (daysLeft > 0) {
                document.getElementById('countdownText').innerText = "อีก " + daysLeft + " วัน จะเก็บสละได้!";
            } else {
                document.getElementById('countdownText').innerText = "เก็บได้เลยตอนนี้!";
                triggerAlert(); // เรียกฟังก์ชันเตือน
            }
        }

        function triggerAlert() {
            document.getElementById('alertModal').style.display = 'flex';
            document.getElementById('alertSound').play();
        }

        function closeModal() {
            document.getElementById('alertModal').style.display = 'none';
        }
    </script>
</body>
</html>
