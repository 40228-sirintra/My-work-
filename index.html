<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumalee Salak Calc</title>
    <style>
        :root {
            --salak-red: #d35400;
            --salak-orange: #e67e22;
            --white: #ffffff;
        }

        body {
            background: linear-gradient(45deg, #d35400, #f39c12);
            font-family: 'Kanit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #444;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 380px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
        }

        h2 { color: var(--salak-red); margin-bottom: 20px; }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 12px;
            outline: none;
            transition: 0.3s;
            font-size: 1rem;
        }

        input:focus { border-color: var(--salak-orange); }

        /* ปุ่มสวยๆ */
        .btn-calc {
            background: var(--salak-red);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(211, 84, 0, 0.4);
            transition: 0.3s;
        }

        .btn-calc:hover {
            background: var(--salak-orange);
            transform: scale(1.02);
        }

        /* Pop-up Overlay */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            z-index: 100;
        }

        /* Pop-up Box */
        .modal {
            background: white;
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            max-width: 320px;
            animation: bounceIn 0.5s ease;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .result-val { font-size: 2rem; font-weight: bold; color: #27ae60; margin: 15px 0; }
        .close-btn { background: #555; margin-top: 10px; }

    </style>
</head>
<body>

    <div class="card">
        <h2>🍓 คำนวณกำไรสละ</h2>
        <div class="input-group">
            <label>ราคาทุน (ต่อ กิโลกรัม)</label>
            <input type="number" id="cost" placeholder="เช่น 60">
        </div>
        <div class="input-group">
            <label>ราคาขาย (ต่อ กิโลกรัม)</label>
            <input type="number" id="price" placeholder="เช่น 85">
        </div>
        <div class="input-group">
            <label>จำนวนที่ขาย (กิโลกรัม)</label>
            <input type="number" id="amount" placeholder="เช่น 10">
        </div>
        <button class="btn-calc" onclick="calculate()">คำนวณกำไรสุทธิ</button>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h2 style="margin:0;">กำไรที่ได้!</h2>
            <div class="result-val" id="totalResult">0 บาท</div>
            <p id="msg">หวานเจี๊ยบเหมือนสละสุมาลีเลย!</p>
            <button class="btn-calc close-btn" onclick="closeModal()">ปิดหน้าต่าง</button>
        </div>
    </div>

    <script>
        function calculate() {
            const cost = document.getElementById('cost').value;
            const price = document.getElementById('price').value;
            const amount = document.getElementById('amount').value;

            if(cost && price && amount) {
                const profit = (price - cost) * amount;
                document.getElementById('totalResult').innerText = profit + " บาท";
                document.getElementById('modal').style.display = 'flex';
            } else {
                alert("กรุณากรอกข้อมูลให้ครบถ้วนก่อนนะคร้าบ");
            }
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
    </script>
</body>
</html>
