<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salacca Harvest Smart Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF5E00;
            --secondary: #FF9900;
            --dark: #1A1A1A;
            --light: #F9F9F9;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #1A1A1A 0%, #333333 100%);
            color: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .dashboard {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 450px;
            transition: transform 0.3s;
        }

        .dashboard:hover { transform: translateY(-5px); }

        .icon { font-size: 80px; margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(255, 94, 0, 0.5)); }
        
        h1 { margin: 0; font-weight: 800; font-size: 28px; color: var(--primary); }
        p { color: #AAAAAA; font-size: 14px; margin-bottom: 30px; }

        input[type="date"] {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 15px;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input[type="date"]:focus { border-color: var(--primary); }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }

        .btn {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 94, 0, 0.3);
            transition: 0.3s;
        }

        .btn:hover { box-shadow: 0 15px 30px rgba(255, 94, 0, 0.5); transform: scale(1.02); }

        #resultBox {
            margin-top: 25px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            display: none;
        }

        #daysLeft { font-size: 32px; font-weight: 800; color: var(--secondary); margin-top: 5px; }

        /* Popup สุดเท่ */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #111;
            padding: 50px 40px;
            border-radius: 30px;
            text-align: center;
            border: 2px solid var(--primary);
            box-shadow: 0 0 50px rgba(255, 94, 0, 0.4);
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .dancing-salacca {
            font-size: 100px;
            display: inline-block;
            animation: bounce 0.5s infinite alternate;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
        }

        @keyframes bounce {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-30px) scale(1.1); }
        }

        .modal h2 { font-size: 36px; color: var(--primary); margin: 20px 0 10px; text-transform: uppercase; }
        .modal p { font-size: 18px; color: white; margin-bottom: 30px; }
        
        .btn-close {
            background: white;
            color: var(--dark);
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="icon">🌴</div>
        <h1>SMART SALACCA</h1>
        <p>ระบบคำนวณวันเก็บเกี่ยว (รอบ 3 เดือน)</p>

        <div style="text-align: left;">
            <label style="font-weight: 600; font-size: 14px; margin-bottom: 8px; display: block;">ระบุวันที่ผสมเกสร</label>
            <input type="date" id="inputDate">
        </div>

        <button class="btn" onclick="checkHarvest()">คำนวณวันเก็บเกี่ยว</button>

        <div id="resultBox">
            <div style="font-size: 14px; color: #aaa;" id="harvestDateStr"></div>
            <div id="daysLeft"></div>
        </div>
    </div>

    <div id="popupModal" class="modal">
        <div class="modal-content">
            <div class="dancing-salacca">😋</div>
            <h2>IT'S HARVEST TIME!</h2>
            <p>สละสุมาลีหวานฉ่ำ พร้อมเก็บเกี่ยวแล้ว!</p>
            <button class="btn-close" onclick="closePopup()">รับทราบ (ปิดเสียง)</button>
        </div>
    </div>

    <audio id="bgMusic" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" loop></audio>

    <script>
        function checkHarvest() {
            const dateVal = document.getElementById('inputDate').value;
            if (!dateVal) return alert("กรุณาเลือกวันที่ก่อนครับ!");

            const startDate = new Date(dateVal);
            const harvestDate = new Date(startDate);
            // ตั้งค่าเวลาเป็น 90 วัน (ประมาณ 3 เดือน) ตามที่คุณต้องการ
            harvestDate.setDate(startDate.getDate() + 90); 

            const today = new Date();
            today.setHours(0,0,0,0);

            const diffTime = harvestDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            const resultBox = document.getElementById('resultBox');
            const dateStr = document.getElementById('harvestDateStr');
            const daysLeft = document.getElementById('daysLeft');

            resultBox.style.display = 'block';
            dateStr.innerText = "กำหนดเก็บเกี่ยว: " + harvestDate.toLocaleDateString('th-TH');

            if (diffDays <= 0) {
                daysLeft.innerText = "พร้อมเก็บเกี่ยวแล้ว!";
                daysLeft.style.color = "var(--primary)";
                triggerAlert();
            } else {
                daysLeft.innerText = "เหลืออีก " + diffDays + " วัน";
                daysLeft.style.color = "var(--light)";
            }
        }

        function triggerAlert() {
            document.getElementById('popupModal').style.display = 'flex';
            // เล่นเพลงทันทีที่ถึงวันเก็บเกี่ยว
            document.getElementById('bgMusic').play();
        }

        function closePopup() {
            document.getElementById('popupModal').style.display = 'none';
            const audio = document.getElementById('bgMusic');
            audio.pause();
            audio.currentTime = 0; // รีเซ็ตเพลงกลับไปจุดเริ่มต้น
        }
    </script>

</body>
</html>
